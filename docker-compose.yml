version: '3.8'

services:
  # 1. De PHP / Apache Webserver
  web:
    build: .
    container_name: mvc_webserver
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app
      - ./public:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=geheim
      - DB_NAME=mvc_database
    depends_on:
      - db

  # 2. De MySQL Database
  db:
    image: mysql:8.0
    container_name: mvc_database
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: geheim
      MYSQL_DATABASE: mvc_database
    volumes:
      - db_data:/var/lib/mysql
      - ./app/db/createscript.sql:/docker-entrypoint-initdb.d/init.sql

  # 3. phpMyAdmin (Nieuw!)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mvc_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=geheim
    depends_on:
      - db

volumes:
  db_data: